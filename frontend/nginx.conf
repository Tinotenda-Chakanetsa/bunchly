server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Resolving the upstream per-request (via a
    # variable in proxy_pass) means nginx won't crash at boot if the
    # backend container's DNS record isn't published yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy /api/* to the Bunchly backend service inside the compose network.
    location /api/ {
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single-page app — fall through to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets.
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
